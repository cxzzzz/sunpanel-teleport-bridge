services:
  sunpanel-teleport-bridge:
    build:
      context: .
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    network_mode: host
    restart: unless-stopped
    environment:
      SUNPANEL_BASE_URL: ${SUNPANEL_BASE_URL}
      SUNPANEL_USERNAME: ${SUNPANEL_USERNAME}
      SUNPANEL_PASSWORD: ${SUNPANEL_PASSWORD}
      SUNPANEL_INSECURE_SKIP_VERIFY: ${SUNPANEL_INSECURE_SKIP_VERIFY:-false}
      SUNPANEL_URL_FIELD: ${SUNPANEL_URL_FIELD:-preferLanUrl}
      SUNPANEL_LOGIN_ENDPOINT: ${SUNPANEL_LOGIN_ENDPOINT:-/api/login}
      SUNPANEL_ITEMS_ENDPOINT: ${SUNPANEL_ITEMS_ENDPOINT:-/api/panel/itemIcon/getListAllGroup}
      TELEPORT_BIN: ${TELEPORT_BIN:-teleport}
      TELEPORT_PROXY: ${TELEPORT_PROXY}
      TELEPORT_JOIN_TOKEN: ${TELEPORT_JOIN_TOKEN:-}
      TELEPORT_INSECURE_SKIP_VERIFY: ${TELEPORT_INSECURE_SKIP_VERIFY:-false}
      TELEPORT_APP_INSECURE_SKIP_VERIFY: ${TELEPORT_APP_INSECURE_SKIP_VERIFY:-true}
      TELEPORT_APP_USE_ANY_PROXY_PUBLIC_ADDR: ${TELEPORT_APP_USE_ANY_PROXY_PUBLIC_ADDR:-true}
      TELEPORT_DATA_DIR: ${TELEPORT_DATA_DIR:-/var/lib/teleport}
      TELEPORT_CONFIG_PATH: ${TELEPORT_CONFIG_PATH:-/etc/teleport/sunpanel-apps.yaml}
      TELEPORT_MANAGED_BY: ${TELEPORT_MANAGED_BY:-sunpanel-teleport-bridge}
      APP_OVERRIDES_PATH: ${APP_OVERRIDES_PATH:-/etc/sunpanel-teleport-bridge/overrides.yaml}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-300s}
      DRY_RUN: ${DRY_RUN:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${TELEPORT_DATA_VOLUME:-/opt/sunpanel-teleport-bridge/data}:/var/lib/teleport
      - ${TELEPORT_CONFIG_VOLUME:-/opt/sunpanel-teleport-bridge/config}:/etc/teleport
      - ${BRIDGE_CONFIG_VOLUME:-/opt/sunpanel-teleport-bridge/bridge-config}:/etc/sunpanel-teleport-bridge:ro
